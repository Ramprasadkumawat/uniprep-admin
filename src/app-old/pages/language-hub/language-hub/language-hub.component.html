<p-accordion value="0"styleClass="white-accordian">
	<p-accordion-panel value="1" selected="isAccordianSelected">
		<p-accordion-header>{{ subModuleName }} Language List</p-accordion-header>
		<p-accordion-content>
			<form [formGroup]="form" (ngSubmit)="submitForm()" #formElm>
				<div class="row">
					<div class="col-md-4">
						<input formControlName="id" type="text" class="form-control" hidden pInputText />
						<div class="form-group">
							<label>Name</label>
							<input formControlName="languagename" type="text" class="form-control" pInputText />
							<div *ngIf="submitted && f.languagename.errors" class="text-danger text-xs">
								<div *ngIf="f.languagename.errors.required">Required</div>
							</div>
						</div>
					</div>
					<div class="col-md-4">
						<div class="form-group">
							<label>Language Code</label>
							<input formControlName="languagecode" type="text" class="form-control" pInputText />
							<div *ngIf="submitted && f.languagecode.errors" class="text-danger text-xs">
								<div *ngIf="f.languagecode.errors.required">Required</div>
							</div>
						</div>
					</div>
					<div class="col-md-4">
						<div class="form-group">
							<label>Speaker</label>
							<input formControlName="speaker" type="text" class="form-control" pInputText />
							<div *ngIf="submitted && f.speaker.errors" class="text-danger text-xs">
								<div *ngIf="f.speaker.errors.required">Required</div>
							</div>
						</div>
					</div>
					<div class="col-md-4">
						<div class="form-group">
							<label>URL Slug</label>
							<input formControlName="urlslug" type="text" class="form-control" pInputText />
							<div *ngIf="submitted && f.urlslug.errors" class="text-danger text-xs">
								<div *ngIf="f.urlslug.errors.required">Required</div>
							</div>
						</div>
					</div>
					<div class="col-md-4">
						<label>Image</label>
						<div class="form-group">
							<div class="input-wrapper">
								<input type="file" (change)="onFileChange($event)" class="form-control w-100" pInputText style="display: none" #fileInput />
								<input type="text" formControlName="image" class="form-control w-100" pInputText readonly (click)="fileInput.click()" />
								<button type="button" style="border-radius: 0rem 0.375rem 0.375rem 0rem" class="upload-button">Upload</button>
								<div *ngIf="submitted && f.image.errors" class="text-danger text-xs">
									<div *ngIf="f.image.errors.required">Required</div>
								</div>
							</div>
							<img *ngIf="editImage" src="{{ editImage }}" alt="image" width="200px" height="200px" />
						</div>
					</div>
				</div>
				<div class="row mt-3">
					<div class="col-12 text-right">
						<button class="ps-4 pe-4 pt-2 pb-2" pButton (click)="resetForm(form)" style="background-color: var(--p-primary-500); border-radius: 8px; border: aliceblue; color: #fff" type="button">Reset Field</button>&nbsp;

						<button class="ps-3 pe-3 pt-2 pb-2" pButton style="background-color: var(--p-primary-500); border-radius: 8px; border: aliceblue; color: #fff" type="submit">{{ !isEditClicked ? "Add" : "Update" }} Language</button>
					</div>
				</div>
			</form>
		</p-accordion-content>
	</p-accordion-panel>
	<p-accordion-panel value="2">
		<p-accordion-header>Filter Category</p-accordion-header>
		<p-accordion-content>
			<form [formGroup]="filterForm" (ngSubmit)="onClickSubmitFilter()" #filterFormElm>
				<div class="row">
					<div class="col-md-4">
						<div class="row">
							<div class="col-md-6">
								<label class="form-label">From</label>
								<div class="input-group">
									<input type="date" formControlName="from" class="form-control border-black paddingfive" />
								</div>
							</div>
							<div class="col-md-6">
								<label class="form-label">To</label>
								<div class="input-group">
									<input type="date" formControlName="to" class="form-control border-black paddingfive" />
								</div>
							</div>
						</div>
					</div>
					<div class="col-md-4">
						<div class="form-group">
							<label>Sub-Module</label>
							<p-multiselect class="paddingfive" styleClass="w-full mt-2" [options]="listOfSubmodules" optionValue="id" formControlName="submodule" placeholder="Select Submodule" optionLabel="language" selectedItemsLabel="{0} items selected" [maxSelectedLabels]="0"></p-multiselect>
						</div>
					</div>
					<div class="col-md-4">
						<div class="form-group">
							<label>Favourite</label>
							<p-select class="" optionValue="id" optionLabel="name" [options]="categoryDropdownList" styleClass="w-full mt-2" formControlName="favourite"></p-select>
						</div>
					</div>
				</div>
				<br />
				<div class="row">
					<div class="col-12 text-right">
						<button class="ps-3 pe-3 pt-2 pb-2" pButton (click)="resetFilter()" style="background-color: var(--p-primary-500); border-radius: 8px; border: aliceblue; color: #fff" type="button" label="Reset Filter"></button>&nbsp;
						<button class="ps-4 pe-4 pt-2 pb-2" pButton style="background-color: var(--p-primary-500); border-radius: 8px; border: aliceblue; color: #fff" type="submit" label="Filter"></button>
					</div>
				</div>
			</form>
		</p-accordion-content>
	</p-accordion-panel>
</p-accordion>

	<div class="card-body">
		<div class="row mt-5">
			<div class="col-lg-3 col-md-6 col-sm-6 mb-3" *ngFor="let item of filteredSearch">
				<div class="card p-3">
					<div class="text-center fw-bold">{{ item.language }}</div>
					<div class="text-center pt-2 pb-2">
						<img src="{{ item.icon }}" alt="" style="height: 100px; width: 100px" />
					</div>
					<div class="d-flex justify-content-center">
						<div class="text-center">
							<span class="fw-bold">{{ item.count ? item.count : 0 }}</span
							><br />
							<span class="sm-font">Total Questions</span>
						</div>
					</div>
					<br />
					<div class="row text-center">
						<div class="d-flex gap-2">
							<div class="flex-grow-1">
								<button (click)="editSubCategoryName(item)" class="w-100 justify-content-center" pButton style="background-color: var(--p-primary-500); border-radius: 8px; border: aliceblue; color: #fff; font-size: 13px">Edit</button>
							</div>
							<div class="flex-grow-1">
								<button routerLink="/language-hub/pvl" [queryParams]="{ languageId: item.id }" class="w-100 justify-content-center" pButton style="background-color: var(--p-primary-500); border-radius: 8px; border: aliceblue; color: #fff; font-size: 13px">View</button>
							</div>
							<p-confirmpopup></p-confirmpopup>
							<div class="flex-grow-1" *ngIf="submodulePermission === 1">
								<button (click)="deleteSubmoduleandQuestion(item)" class="w-100 justify-content-center" pButton style="background-color: red; border-radius: 8px; border: aliceblue; color: #fff; font-size: 13px">
									<i class="fa-solid fa-trash"></i>
								</button>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
	<p-paginator (onPageChange)="pageChange($event)" [first]="first" [rows]="rows" [totalRecords]="totalCount" [rowsPerPageOptions]="[10, 20, 30]"></p-paginator>
</div>
