<!-- Filter Accordion -->
<p-accordion value="0"styleClass="white-accordian">
		<p-accordion-panel value="1">
		<p-accordion-header>Filter Employees</p-accordion-header>
		<p-accordion-content>
			<form [formGroup]="filterForm">
				<div class="row">
					<!-- <div class="col-md-4">
          <div class="form-group">
            <label>Name</label>
            <p-select
              formControlName="username"
              optionValue="id"
              optionLabel="full_name"
              styleClass="w-full"
              [options]="studentList"
              placeholder="Select Username"
              [filter]="true"
              [showClear]="true"
            >
            </p-select>
          </div>
        </div> -->
					<div class="col-md-4">
						<div class="form-group">
							<label>Location</label>
							<p-select fluid appendTo="body" styleClass="w-full" formControlName="location" [options]="workLocation" placeholder="City, Country" optionLabel="work_location" [virtualScroll]="true" [virtualScrollItemSize]="40" [filter]="true" filterBy="work_location" [showClear]="true" optionValue="id"></p-select>
						</div>
					</div>
					<div class="col-md-4">
						<div class="form-group">
							<label>Status</label>
							<p-select
								formControlName="status"
								optionValue="name"
								optionLabel="name"
								styleClass="w-full"
								[options]="[
									{ id: 0, name: 'Received' },
									{ id: 1, name: 'Shortlisted' },
									{ id: 2, name: 'Sent' }
								]"
								placeholder="Select Status"
								[filter]="true"
								[showClear]="true"></p-select>
						</div>
					</div>
					<div class="row mt-3">
						<div class="col-12 text-right">
							<button class="btn btn-danger" type="button" (click)="getCompaniesList()">Reset Filter</button>
							<button class="btn btn-primary" type="submit" (click)="getCompaniesList(filterForm.value)">Filter Employers</button>
						</div>
					</div>
				</div>
			</form>
		</p-accordion-content>
	</p-accordion-panel>
</p-accordion>

<!-- Job Listings with Updated Card Style -->
<div class="job-listings p-3 bg-white">
	<div class="header-section p-3 bg-white border-bottom">
		<div class="d-flex justify-content-between align-items-center">
			<div class="d-flex align-items-center">
				<button pButton pRipple type="button" icon="pi pi-arrow-left" class="p-button-rounded p-button-primary me-3" [routerLink]="'/talent-connect/talents'"></button>
				<div>
					<h4 class="mb-0">{{ candidates[0]?.company_name }} Company Connect</h4>
					<small class="text-muted">Total Applied: {{ totalCandidates.toString().padStart(2, "0") }}</small>
				</div>
			</div>

			<div class="d-flex align-items-center">
				<span class="p-input-icon-left me-3" style="width: 350px">
					<input type="text" pInputText [(ngModel)]="searchText" placeholder="Search" class="w-100" />
				</span>
				<button pButton pRipple type="button" label="Export" icon="pi pi-download" class="p-button-primary"></button>
			</div>
		</div>
	</div>
	<div class="row g-2 my-1">
		<div class="col-md-3" *ngFor="let candidate of candidates">
			<!-- Updated card to match the new minimal design -->
			<div class="card border rounded-3 shadow-sm h-100">
				<div class="card-body p-3">
					<div class="d-flex">
						<!-- Logo -->
						<div class="me-3">
							<img [src]="candidate?.company_logo || '/api/placeholder/80/80'" class="rounded border" alt="company logo" width="60" height="60" />
						</div>

						<!-- Company/Candidate Info -->
						<div class="d-flex flex-column justify-content-center" style="font-size: 12px">
							<h6 class="card-title mb-1 fw-bold">
								{{ candidate.company_name || candidate.name }}
							</h6>

							<!-- Location with icon -->
							<div class="d-flex align-items-center mb-1">
								<i class="pi pi-map-marker text-success me-1"></i>
								<span class="text-muted">{{ candidate.HQ_city }},{{ candidate.HQ_country }}</span>
							</div>

							<!-- Status Badge -->
							<div class="status-badge" [ngClass]="getStatusClass(candidate?.status)">
								{{ getStatusLabel(candidate?.status) }}
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>

	<hr />
	<div class="w-100 bg-white">
		<p-paginator *ngIf="totalCandidates >= 0" (onPageChange)="pageChange($event)" [rows]="pageSize" [totalRecords]="totalCandidates" [rowsPerPageOptions]="[10, 20, 30]"></p-paginator>
	</div>
</div>
