<div class="card mt-2">
    <div class="card-header d-flex w-full align-items-center justify-content-between" style="background-color: #fff;">
        <span>Quiz List <br><span style="color: #A1A1A1; font-size: 10px;">Total
                Questions Count:{{totalQuizCount}}</span></span>
        <div class=" text-right p-1">
            <button (click)="addnewquestionpopup()" class="ps-3 pe-3 pt-2 pb-2" pButton
                style="background-color: var(--p-primary-500);border-radius: 8px; border: aliceblue; color: #fff;">New
                Question
                &nbsp; <i class="fa-solid fa-plus"></i></button>&nbsp;
            <button class="ps-3 pe-3 pt-2 pb-2" (click)="addnewquestionpopupImport()" pButton
                style="background-color: var(--p-primary-500);border-radius: 8px; border: aliceblue; color: #fff;">Import
                &nbsp;
                <i class="pi pi-file-export"></i></button>&nbsp;
            <!-- <button class="ps-3 pe-3 pt-2 pb-2" pButton
                style="background-color: var(--p-primary-500);border-radius: 8px; border: aliceblue; color: #fff;"
                (click)="exportFile()">Export &nbsp;
                <i class="pi pi-file-export"></i></button> -->
        </div>
    </div>
    <div class="card-body">
        <!-- card list -->
        <div class="row gap-4 d-flex  p-2">
            <div class="card" style="width: 23%;" *ngFor="let quiz of questionsList let i = index" [attr.data-index]="i">
                        <div class="card-body">
                            <div class="text-center pt-2 pb-2">
                                <img [src]="quiz.image" alt="" style="height: 60px; width: 80px; border-radius: 50%;">
                            </div>
                            <h6 class="card-title mb-3">{{quiz.title}}</h6>
                            <div class="d-flex gap-2 card-buttons">
                                <button (click)="editQuestion(quiz)" class="px-3 py-2" pbutton
                                style="background-color: var(--p-primary-500);border-radius: 8px; border: aliceblue; color: #fff; font-size: 13px;">
                                Edit
                            </button>                                
                            <button (click)="viewQuestion(quiz)" class="px-3 py-2" pButton
                            style="background-color: var(--p-primary-500);border-radius: 8px; border: aliceblue; color: #fff; font-size: 13px;">
                            View
                        </button>                            </div>
                            <p class="last-updated mt-3 mb-0">Last Updated: {{quiz.updated_at | date: 'medium'}}</p>
                        </div>
                    </div>
        </div>
    </div>
    <p-paginator (onPageChange)="onPageChange($event)" [rows]="perPage" [totalRecords]="totalQuizCount"
        [rowsPerPageOptions]="[10, 100, 200,500]"></p-paginator>
</div>
<div>
    <div class="modal" tabindex="-1" role="dialog" [ngStyle]="{'display':newquestionadd}" id="addQuestionModal"
        style="backdrop-filter: brightness(0.5);">
        <div class="modal-dialog">
            <div class="modal-content p-1" style="width: 150%;">
                <span (click)="closeAddQuizPopUp()"
                    style="color: var(--p-primary-500); text-align: right; cursor: pointer;"><i
                        class="fa-solid fa-xmark"></i></span>
                <form [formGroup]="form" (ngSubmit)="onSubmit()">
                    <div class="modal-body">
                        <span style="color: #001631; font-size: 20px;">Country Insights</span>
                        <div class="row mt-3">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>Title</label>
                                    <input formControlName="title" type="text" class="form-control" pInputText>
                                    <div *ngIf="submitted && f.title.errors" class="text-danger text-xs">
                                        <div *ngIf="f.title.errors.required">Required</div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label>Image</label>
                                <div class="form-group">
                                    <div class="input-wrapper">
                                        <input type="file" (change)="onFileChange($event)" class="form-control w-100"
                                            pInputText style="display: none;" #fileInput>
                                        <input type="text" formControlName="image" class="form-control w-100" pInputText
                                            readonly (click)="fileInput.click()">
                                        <button type="button" style="border-radius: 0rem 0.375rem 0.375rem 0rem;"
                                            class="upload-button" (click)="fileInput.click()">Upload
                                        </button>
                                        <div *ngIf="submitted && f.image.errors" class="text-danger text-xs">
                                            <div *ngIf="f.image.errors.required">Required</div>
                                        </div>
                                    </div>
                                    <img *ngIf="editImage" src="{{editImage}}" alt="image" width="200px" height="200px" />
                                </div>
                                </div>
                            <div class="col-md-12 mt-4">
                                <div class="form-group">
                                    <label>Answer</label>
                                    <p-editor
                                    #editor
                                    formControlName="answer"
                                    escape="false"
                                    class="newClass"
                                    [style]="{ height: '200px' }"
                                  ></p-editor>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="p-3 mb-4 mt--4 text-left">
                        <div class="d-flex justify-content-between">
                            <button type="submit" class="ps-3 pe-3 pt-2 pb-2" pButton
                            style="background-color: var(--p-primary-500);border-radius: 8px; border: aliceblue; color: #fff;">{{'Edit History'}}
                           </button>
                            <div class="d-flex gap-3">
                                <button type="button" class="ps-3 pe-3 pt-2 pb-2" pButton
                                style="background-color: var(--p-secondary-500);border-radius: 8px; border: aliceblue; color: #fff;">{{'Delete'}}
                               </button>
                                <button type="submit" class="ps-3 pe-3 pt-2 pb-2" pButton
                                    style="background-color: var(--p-primary-500);border-radius: 8px; border: aliceblue; color: #fff;">{{addOrUpdate}}
                                </button>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
    </div>
</div>

<div>
    <div class="modal" tabindex="-1" role="dialog" [ngStyle]="{'display':newquestionaddimport }" id="importModal"
        style="backdrop-filter: brightness(0.5);">
        <div class="modal-dialog">
            <div class="modal-content p-2" style="width: 150%;">
                <span (click)="closeAddQuizPopUpImport()"
                    style="color: var(--p-primary-500); text-align: right; cursor: pointer;"><i
                        class="fa-solid fa-xmark"></i></span>
                <div>
                    <label for="file" class="reading-drop-container">
                        <i class="pi pi-upload reading-drop-title"></i>
                        <input type="file" id="file" class="d-none" (change)="onCsvFileChangeImport($event)"
                            (click)="$event['target']['value']=''" accept=".csv"><br />
                        <div class="reading-sm-font" *ngIf="selectedCSVFile?.name">{{selectedCSVFile.name}}</div>
                        <div *ngIf="!selectedCSVFile?.name" class="d-flex flex-column gap-1 text-center">
                            <span class="reading-sm-font">Only .csv file formats are supported for uploads</span>
                            <span class="reading-sm-font">Please maintain the format of uploading to stop failures</span>
                        </div>
                    </label><br />
                    <div class="text-center">
                        <button class="btn btn-primary" (click)="uploadFile()">
                            <i class="fa-solid fa-upload"></i> Upload
                        </button>
                        <button class="btn btn-primary" (click)="downloadSampleCSV()">
                            <i class="fa-solid fa-download"></i> Download Sample Doc
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
