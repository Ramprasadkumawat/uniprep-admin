<div style="width: 100%; height: 80vh; overflow: unset !important; overflow-x: unset !important">
	<p-accordion styleClass="white-accordian" (onClose)="activeIndex = -1" (onOpen)="activeIndex = 1" value="{{activeIndex}}">
		<p-accordion-panel value="1">
			<p-accordion-header>{{ title }}</p-accordion-header>
			<p-accordion-content>
				<form [formGroup]="subjectCategoryForm" (ngSubmit)="submitCategoryForm()">
					<input formControlName="id" type="hidden" class="form-control" pInputText />
					<div class="row">
						<div class="col-12">
							<div class="row">
								<div class="col-md-4 p-2">
									<div class="form-group">
										<label class="mb-1">Subject </label>
										<input formControlName="category_name" type="text" class="form-control" pInputText />
										<div *ngIf="submitted && subjectCategoryForm.get('category_name').errors" class="text-danger text-xs">
											<div *ngIf="subjectCategoryForm.get('category_name').hasError('required')">Required</div>
										</div>
									</div>
								</div>
								<div class="col-md-4 p-2"></div>
								<div class="col-md-4 p-5">
									<div class="form-group">
										<label class="mb-1"></label>
										<button class="ps-3 pe-3 pt-2 pb-2" pButton style="background-color: var(--p-primary-500); border-radius: 8px; border: aliceblue; color: #fff" type="submit">{{ btntxt }}</button>
									</div>
								</div>
							</div>
						</div>
					</div>
				</form>
				<form [formGroup]="subjectForm" (ngSubmit)="submitSubjectForm()">
					<input formControlName="id" type="hidden" class="form-control" pInputText />
					<div class="row">
						<div class="col-12">
							<div class="row">
								<div class="col-md-4 p-2">
									<div class="form-group">
										<label class="mb-1">Subject Category</label>
										<p-select placeholder="Subject Category" optionValue="id" formControlName="category_id" [filter]="true" [filterBy]="'category_name'" optionLabel="category_name" styleClass="w-full" [options]="subjectName"></p-select>
										<div *ngIf="submission && subjectForm.get('category').errors" class="text-danger text-xs">
											<div *ngIf="subjectForm.get('category').hasError('required')">Required</div>
										</div>
									</div>
								</div>
								<div class="col-md-4 p-2">
									<div class="form-group">
										<label class="mb-1"> Subject </label>
										<input formControlName="subject_name" type="text" class="form-control" pInputText />
										<div *ngIf="submission && subjectForm.get('subject_name').errors" class="text-danger text-xs">
											<div *ngIf="subjectForm.get('subject_name').hasError('required')">Required</div>
										</div>
									</div>
								</div>
								<div class="col-md-4 p-4">
									<label class="mb-1"></label>
									<button class="ps-4 pe-4 pt-2 pb-2" pButton style="background-color: var(--p-primary-500); border-radius: 8px; border: aliceblue; color: #fff" type="button" (click)="reset()">Reset Field</button>&nbsp;
									<button class="ps-3 pe-3 pt-2 pb-2" pButton style="background-color: var(--p-primary-500); border-radius: 8px; border: aliceblue; color: #fff" type="submit">{{ btn2txt }}</button>
								</div>
							</div>
						</div>
					</div>
				</form>
			</p-accordion-content>
		</p-accordion-panel>
		<p-accordion-panel value="2">
			<p-accordion-header>Filter Subject List</p-accordion-header>
			<p-accordion-content>
				<form [formGroup]="filterSubject" (ngSubmit)="submitFilterForm()">
					<div class="row">
						<div class="col-md-4 p-2">
							<div class="form-group">
								<label class="mb-1">Subject Category</label>
								<p-multiselect styleClass="w-100" (onChange)="subjectOnChange($event)" formControlName="category" placeholder="Select Subject Category" [options]="subjectName" display="chip" optionLabel="category_name" optionValue="id" [appendTo]="'body'" [filterBy]="'category_name'"></p-multiselect>
							</div>
						</div>
						<div class="col-md-4 p-2">
							<div class="form-group">
								<label class="mb-1">Subject</label>
								<p-multiselect styleClass="w-100" formControlName="subject" placeholder="Select Subject" [options]="subjectCategory" display="chip" optionLabel="subject_name" optionValue="id" [filterBy]="'subject_name'" [appendTo]="'body'"></p-multiselect>
							</div>
						</div>
					</div>
					<div class="row mt-3">
						<div class="col-12 text-right">
							<button class="ps-4 pe-4 pt-2 pb-2" pButton style="background-color: var(--p-primary-500); border-radius: 8px; border: aliceblue; color: #fff" type="button" (click)="filterReset()">Reset Field</button>&nbsp;
							<button class="ps-3 pe-3 pt-2 pb-2" pButton style="background-color: var(--p-primary-500); border-radius: 8px; border: aliceblue; color: #fff" type="submit">Filter</button>
						</div>
					</div>
				</form>
			</p-accordion-content>
		</p-accordion-panel>
	</p-accordion>
	<p-table size="small" scrollHeight="600px" [scrollable]="true" styleClass="p-datatable-gridlines" [value]="subjectListData" [totalRecords]="totalSubjects" [tableStyle]="{ 'min-width': '40rem' }">
		<ng-template pTemplate="caption">
			<div class="d-flex w-full align-items-center justify-content-between">
				<div>
					<span>Subject List</span> <br />
					<span class="text-muted text-small">Total Subjects : {{ totalSubjects }}</span>
				</div>
				<div>
					<button type="button" class="ms-2 me-2 ps-3 pe-2 pt-2 pb-2" pButton (click)="redirectToCourse()" style="background-color: var(--p-primary-500); border-radius: 8px; border: aliceblue; color: #fff">Course &nbsp;</button>
					<!-- <button type="button" class="ms-2 me-2 ps-3 pe-2 pt-2 pb-2" pButton
                        style="background-color: var(--p-primary-500); border-radius: 8px; border: aliceblue; color: #fff">Import
                        &nbsp; <i class="pi pi-file-export"></i></button> -->
					<button type="button" class="ms-2 me-2 ps-3 pe-2 pt-2 pb-2" pButton (click)="exportSubjects()" style="background-color: var(--p-primary-500); border-radius: 8px; border: aliceblue; color: #fff">Export &nbsp;<i class="pi pi-file"></i></button>
				</div>
			</div>
		</ng-template>
		<ng-template pTemplate="header">
			<tr>
				<th class="border-cell">Subject Category</th>
				<th class="border-cell">Subject</th>
				<th class="border-cell">Actions</th>
			</tr>
		</ng-template>
		<ng-template pTemplate="body" let-subject>
			<tr>
				<td>{{ subject.category_name }}&nbsp;</td>
				<td>{{ subject.subject_name }}&nbsp;</td>
				<td>
					<div class="view-btn m-1" style="cursor: pointer">
						<a (click)="Editsubject(subject); $event.preventDefault()"><i class="fa-solid fa-pen"></i> Edit</a>
					</div>
					<div class="view-btn m-1" style="cursor: pointer; white-space: nowrap">
						<a (click)="Deletesubject(subject.subject_id); $event.preventDefault()"><i class="fa-solid fa-trash"></i> Delete</a>
					</div>
				</td>
			</tr>
		</ng-template>
	</p-table>
	<div class="card-footer">
		<p-paginator [rows]="pageSize" [totalRecords]="totalSubjects" (onPageChange)="pageChange($event)" [rowsPerPageOptions]="[100, 500, 1000]"></p-paginator>
	</div>
	<p-scrollTop #scrollTopButton target="parent" styleClass="custom-scrolltop" [threshold]="100" icon="pi pi-arrow-up"></p-scrollTop>
</div>
