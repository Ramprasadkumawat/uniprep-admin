<div class="container-fluid">
  <div class="row align-items-center">
    <div class="col-md-6 col-12">
      <h4 class="mb-0">Revenue Dashboard</h4>
    </div>
    <div class="col-md-6 col-12 text-md-end">
      <button severity="warn" type="button" pButton (click)="refreshDashboardData()"><i class="pi pi-refresh"></i> Refresh Data</button>
      <p class="text-small text-success mt-1">
        Last Refreshed : <b>{{ lastRefreshedTime || "Not refreshed yet" }}</b>
      </p>
    </div>
  </div>
</div>

                <label class="form-label">To</label>
                <input type="date" formControlName="createdTo" class="form-control border-black paddingfive" pInputText />
              </div>
            </div>
          </div>

                   <p-multiselect class="form-control border-black paddingfive" [options]="programs" optionValue="id" formControlName="programlevel" defaultLabel="Select Program Level" optionLabel="programlevel" selectedItemsLabel="{0} items selected"></p-multiselect>

          <div class="col-md-3">

              <select class="form-control border-black paddingfive" #source (change)="getSource(source.value)" formControlName="source">
                <option *ngFor="let sourcetype of sourcetypes; let i = index" value="{{ sourcetype.id }}">

          <div class="col-md-3">

            <label class="form-label"></label>
            <div class="d-flex justify-content-end align-items-center">

            </div>
          </div>
        </div>
      </form>
    </p-accordion-content>
  </p-accordion-panel>

<div class="row mt-3">
  <div class="col-md-6">
    <div class="card">
      <div class="card-body d-flex align-items-center justify-content-between">
        <div>
          <h5 class="card-title text-muted mb-0" style="font-size: 15px">Total Revenue</h5>
          <span class="h2 font-weight-bold mb-0" style="font-size: 25px; color: #001631">
            {{ totalrev }}
          </span>
        </div>
        <i class="fa-solid fa-money-bill-trend-up" style="color: var(--p-primary-500); font-size: 2rem"></i>
      </div>
    </div>
  </div>
  <div class="col-md-6">
    <div class="card">
      <div class="card-body d-flex align-items-center justify-content-between">
        <div>
          <h5 class="card-title text-muted mb-0 ml-3" style="font-size: 15px">No of Payments</h5>
          <span class="h2 font-weight-bold mb-0" style="font-size: 25px; color: #001631">
            {{ noOfPayments }}
          </span>
        </div>
        <i class="fa-solid fa-hand-holding-dollar" style="color: var(--p-primary-500); font-size: 2rem"></i>
      </div>
    </div>
  </div>
</div>

<div class="row mt-20">
  <div class="col-md-6" style="height: 100%">
    <div class="card card-stats mb-4 mb-xl-0 p-3">
      <div class="card-header">
        <div style="display: flex; justify-content: space-between; align-items: center">
          <p class="text-muted fw-semibold">Daily Revenue</p>
          <span style="font-size: smaller">Total revenue : {{ usersDailyRevenue?.daily_revenue }}</span>
        </div>
      </div>
      <div class="card-body2">
        <div class="" style="width: 100%; height: 400px">
          <p-chart class="w-100 h-100" type="bar" height="100% !important" [data]="userDailyRevenueGraph" [options]="dailyOptions"></p-chart>
        </div>
      </div>
    </div>
  </div>
  <div class="col-md-6">
    <div class="card card-stats mb-4 mb-xl-0 p-3">
      <div class="card-header">
        <p class="text-muted fw-semibold">Source Wise</p>
      </div>
      <div class="card-body2">
        <div class="" style="width: 100%; height: 400px">
          <p-chart class="w-100 h-100" height="100% !important" type="pie" [data]="usersRevenueSourceChartData" [options]="sourceOptions"></p-chart>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="row mt-20">
  <div class="col-md-6">
    <div class="card card-stats mb-4 mb-xl-0 p-3">
      <div class="card-header">
        <p class="text-muted fw-semibold">Subscription Plan</p>
      </div>
      <div class="card-body2">
        <div class="" style="width: 100%; height: 400px">
          <p-chart class="w-100 h-100" height="100% !important" type="pie" [data]="userPlanRevenueGraph" [options]="planOptions"></p-chart>
        </div>
      </div>
    </div>
  </div>
</div>
