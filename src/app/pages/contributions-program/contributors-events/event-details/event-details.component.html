<div class="d-flex gap-2">
	<div class="d-flex gap-2" style="cursor: pointer" [routerLink]="['/contributors/events']">
		<i class="pi pi-arrow-left"></i>
		<h6>Back</h6>
	</div>
	<h6>Events</h6>
</div>
<div class="mt-4">
	<p-tabs styleClass="active-bg-black customtab" activeIndex="1" value="1">
		<p-tablist>
			<p-tab value="1">Event Details</p-tab>
			<p-tab value="2">Gallery</p-tab>
		</p-tablist>
		<p-tabpanels>
			<p-tabpanel value="1" header="Events Details">
				<div class="p-2 card border border-0">
					<div class="card-body border-b-1">
						<!-- College Details Section -->
						<div class="d-flex justify-content-between align-items-center">
							<h5 class="card-title py-2">Events Details</h5>
						</div>
						<form [formGroup]="form">
							<div class="row">
								<div class="col-md-4 mb-2">
									<label>Events Name</label>
									<input formControlName="name" type="text" class="form-control" pInputText />
									<div *ngIf="submitted && f.name.errors" class="text-danger text-xs">
										<div *ngIf="f.name.errors.required">Required</div>
									</div>
								</div>
								<div class="col-md-3 mb-2">
									<div class="form-group">
										<label>Event Type</label>
										<p-select formControlName="type" optionValue="id" optionLabel="value" styleClass="w-full" [options]="eventType" placeholder="Event Type"> </p-select>
										<div *ngIf="submitted && f.type.errors" class="text-danger text-xs">
											<div *ngIf="f.type.errors.required">Required</div>
										</div>
									</div>
								</div>
								<div class="col-md-5">
									<div class="form-group">
										<label>College Video</label>
										<input formControlName="link" type="text" class="form-control" pInputText />
									</div>
								</div>

								<div class="col-md-6 mb-2">
									<label>Location</label>
									<input formControlName="location" type="text" class="form-control" pInputText />
									<div *ngIf="submitted && f.location.errors" class="text-danger text-xs">
										<div *ngIf="f.location.errors.required">Required</div>
									</div>
								</div>
								<div class="col-md-6 mb-2">
									<label>Upload Cover Image</label>
									<div class="form-group">
										<div class="input-wrapper">
											<input type="file" (change)="onCoverFileChange($event)" class="form-control w-100" pInputText style="display: none" #fileCoverInput />
											<input type="text" formControlName="cover_image" class="form-control w-100" pInputText readonly (click)="fileCoverInput.click()" />
											<button type="button" (click)="fileCoverInput.click()" style="border-radius: 0rem 0.375rem 0.375rem 0rem" class="upload-button">Upload</button>
										</div>
									</div>
									<div *ngIf="submitted && f.cover_image.errors" class="text-danger text-xs">
										<div *ngIf="f.cover_image.errors.required">Required</div>
									</div>
									<img *ngIf="coverThumbnailImage" src="{{ coverThumbnailImage }}" alt="image" width="200px" height="200px" />
								</div>

								<div class="col-md-12 mb-2">
									<label>Events Information</label>
									<textarea class="form-control" rows="4" formControlName="info"></textarea>
									<div *ngIf="submitted && f.info.errors" class="text-danger text-xs">
										<div *ngIf="f.info.errors.required">Required</div>
									</div>
								</div>
							</div>
							<div class="mb-4">
								<div class="d-flex justify-content-end mt-2">
									<button pButton class="btn btn-primary" (click)="onSubmitDetails()">Update</button>
								</div>
							</div>
						</form>
					</div>
				</div>
			</p-tabpanel>
			<p-tabpanel value="2" header="Gallery">
				<div class="row">
					<div class="d-flex col-sm-5 col-md-6 justify-content-between">
						<div class="d-flex align-items-center">
							<div class="d-flex flex-column px-2">
								<span style="font-size: 20px">Gallery</span>
								<span class="text-xs" style="color: rgb(205, 203, 203)">Total Count:{{ galleryItemsCount }}</span>
							</div>
						</div>
					</div>
					<div class="d-flex col-sm-5 col-md-6 justify-content-end">
						<div class="d-flex gap-2 align-items-center p-2">
							<button class="btn btn-primary" (click)="showAddEditGalleryModel()"><i class="pi pi-plus"></i> &nbsp; Add Gallery items</button>
						</div>
					</div>
				</div>
				<div class="gallery-grid p-2">
					<div *ngFor="let item of galleryItems" class="gallery-item">
						<div class="position-relative" (click)="showAddEditGalleryModel(item)">
							<img [src]="item.image_name" [alt]="item.title" class="gallery-media" [title]="item.title" />
						</div>
					</div>
				</div>
				<div class="d-flex justify-content-between align-items-center mt-4">
					<div class="d-flex align-items-center"></div>
					<div class="w-100 d-flex justify-content-center" style="text-align: right">
						<p-paginator (onPageChange)="galleryPageChange($event)" [rows]="galleryPageSize" [totalRecords]="galleryItemsCount" [rowsPerPageOptions]="[20, 30, 40]"></p-paginator>
					</div>
				</div>
			</p-tabpanel>
		</p-tabpanels>
	</p-tabs>
</div>

<p-dialog [header]="galleryId ? 'Edit Gallery Item' : 'Add Gallery Item'" [(visible)]="isAddEditGallery" [modal]="true" [style]="{ width: '50vw' }" (onHide)="closeGalleryModal()">
	<form [formGroup]="galleryForm" (ngSubmit)="onSubmitGallery()">
		<div class="row">
			<div class="col-12 mb-2">
				<div class="form-group">
					<label>Item Title</label>
					<input formControlName="title" type="text" class="form-control" />
					<div *ngIf="gallerySubmitted && gF.title.errors" class="text-danger text-xs">
						<div *ngIf="gF.title.errors.required">Required</div>
					</div>
				</div>
			</div>
			<div class="col-12 mb-2">
				<div class="form-group">
					<label>Youtube Video Link (Optional)</label>
					<input formControlName="youtube_link" type="text" class="form-control" />
				</div>
			</div>
			<div class="col-12 mb-2">
				<label>Upload Cover Images</label>
				<div class="form-group">
					<div class="input-wrapper">
						<input type="file" (change)="onFileChange($event)" class="form-control w-100" pInputText style="display: none" #fileInput [multiple]="!galleryId" />
						<input type="text" formControlName="image" class="form-control w-100" pInputText readonly (click)="fileInput.click()" [value]="fileNames.join(', ')" />
						<button type="button" (click)="fileInput.click()" style="border-radius: 0rem 0.375rem 0.375rem 0rem" class="upload-button">Upload</button>
					</div>
					<div *ngIf="gallerySubmitted && gF.image.errors" class="text-danger text-xs">
						<div *ngIf="gF.image.errors.required">Required</div>
					</div>
				</div>
				<table class="table table-responsive" *ngIf="fileNames.length > 0">
					<thead>
						<tr>
							<th>Image</th>
							<th>File Name</th>
							<th>Action</th>
						</tr>
					</thead>
					<tbody>
						<tr *ngFor="let img of thumbnailImages; let i = index">
							<td><img [src]="img" alt="image" width="100px" height="100px" class="rounded shadow-sm" /></td>
							<td>{{ fileNames[i] }}</td>
							<td>
								<button type="button" class="btn btn-danger btn-sm mt-1" (click)="removeImage(i)">Remove</button>
							</td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>
		<div class="row mt-3">
			<div class="col-12 text-right">
				<p-confirmpopup></p-confirmpopup>
				<button class="btn btn-teritary" type="button" (click)="galleryId ? deteteCollegeGallery($event) : closeGalleryModal()">
					{{ galleryId ? "Delete" : "Cancel" }}
				</button>
				<button class="btn btn-primary" type="submit">{{ galleryId ? "Update" : "Submit" }}</button>
			</div>
		</div>
	</form>
</p-dialog>
